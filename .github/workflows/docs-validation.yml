name: Documentation Validation

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'scripts/check-markdown-links.py'
      - '.github/workflows/docs-validation.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'scripts/check-markdown-links.py'
      - '.github/workflows/docs-validation.yml'

permissions:
  contents: read

jobs:
  markdown-links:
    name: Relative Markdown links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile validator
        run: python -m py_compile scripts/check-markdown-links.py

      - name: Validate relative Markdown links
        run: python scripts/check-markdown-links.py
